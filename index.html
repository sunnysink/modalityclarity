/* ── localStorage persistence ── */
const STORAGE_KEY = 'mcg_state';
function loadState() { try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || {}; } catch { return {}; } }
function saveState(patch) { try { const s = loadState(); Object.assign(s, patch); localStorage.setItem(STORAGE_KEY, JSON.stringify(s)); } catch {} }
function usePersisted(key, initial) {
  const [val, setVal] = useState(() => { const s = loadState(); return s[key] !== undefined ? s[key] : initial; });
  useEffect(() => { saveState({ [key]: val }); }, [key, val]);
  return [val, setVal];
}

/* ── EMBER PARTICLE SYSTEM ── */
function EmberSystem() {
  const containerRef = useRef(null);
  useEffect(() => {
    const mq = window.matchMedia('(prefers-reduced-motion: reduce)');
    if (mq.matches) return;
    const interval = setInterval(() => {
      if (!containerRef.current) return;
      const ember = document.createElement('div');
      ember.className = 'ember-particle';
      ember.style.left = Math.random() * 100 + 'vw';
      ember.style.bottom = '-8px';
      ember.style.width = (2 + Math.random() * 2) + 'px';
      ember.style.height = ember.style.width;
      ember.style.animationDuration = (6 + Math.random() * 6) + 's';
      containerRef.current.appendChild(ember);
      setTimeout(() => ember.remove(), 12000);
    }, 700);
    return () => clearInterval(interval);
  }, []);
  return React.createElement('div', { ref: containerRef, style: { position:'fixed', inset:0, pointerEvents:'none', zIndex:0, overflow:'hidden' } });
}

  const orbs = [
    { w:280, h:280, color:'rgba(196,87,31,0.10)', dur:14, x:'15%', y:'10%' },
    { w:220, h:220, color:'rgba(154,111,62,0.10)', dur:18, x:'80%', y:'20%' },
    { w:240, h:240, color:'rgba(44,95,90,0.09)', dur:16, x:'70%', y:'80%' },
    { w:160, h:160, color:'rgba(122,93,107,0.07)', dur:20, x:'10%', y:'75%' },
  ];
  return React.createElement('div', { className:'orb-ambient', style:{ position:'fixed', inset:0, pointerEvents:'none', zIndex:0, overflow:'hidden' } },
    orbs.map((o, i) => React.createElement('div', { key:i, style:{
      position:'absolute', left:o.x, top:o.y, width:o.w, height:o.h,
      borderRadius:'50%', background:o.color, filter:'blur(60px)',

      animationDelay:`-${i * 3}s`
    }}))
  );
}

  const [customName, setCustomName] = useState("");
  const [sessionName, setSessionName] = usePersisted('sessionName', "");
  const [sessionFrame, setSessionFrame] = usePersisted('sessionFrame', "");
  const [sessionIntent, setSessionIntent] = usePersisted('sessionIntent', "");
  const [boundaryWho, setBoundaryWho] = usePersisted('boundaryWho', "");
  const [boundaryScope, setBoundaryScope] = usePersisted('boundaryScope', "");
  const [boundaryPrepared, setBoundaryPrepared] = usePersisted('boundaryPrepared', "");
  const [showExportText, setShowExportText] = useState(false);
  const [exportText, setExportText] = useState("");
  const [copied, setCopied] = useState(false);
  const [activeArchetype, setActiveArchetype] = usePersisted('activeArchetype', null);
  const [roleAssignments, setRoleAssignments] = usePersisted('roleAssignments', {});

  useEffect(() => { if (loadedArchetype && (!activeArchetype || loadedArchetype.name !== activeArchetype.name)) { setSessionFrame(loadedArchetype.name); setSessionName(""); setSessionIntent(""); setActiveArchetype(loadedArchetype); setFlowOrder([]); setCustomModData({}); setBoundaryWho(""); setBoundaryScope(""); setBoundaryPrepared(""); setShowExportText(false); setRoleAssignments({}); } }, [loadedArchetype]);

  const addMod = (modId) => { if(flowOrder.length<8) setFlowOrder([...flowOrder, modId+"__"+Date.now()]); };
  const getModCount = (modId) => flowOrder.filter(id=>id.split("__")[0]===modId).length;
  const addCustomMod = () => { if(customName.trim()&&flowOrder.length<8){ const id="custom_"+Date.now(); setCustomModData({...customModData,[id]:{id,name:customName.trim(),icon:"○",color:S.mauve}}); setFlowOrder([...flowOrder,id]); setCustomName(""); setShowCustomInput(false); } };
  const removeFromFlow = (modId) => { setFlowOrder(flowOrder.filter(m=>m!==modId)); if(modId.startsWith("custom_")){const d={...customModData};delete d[modId];setCustomModData(d);} };
  const getModData = (instId) => instId.startsWith("custom_")?customModData[instId]:MODALITIES.find(m=>m.id===instId.split("__")[0]);
  const moveInFlow = (index,direction) => { const f=[...flowOrder]; const s=index+direction; if(s>=0&&s<f.length){[f[index],f[s]]=[f[s],f[index]];setFlowOrder(f);} };
  const getRole = (index,total) => { if(total===1) return "Spine"; if(index===0) return "Opens"; if(index===total-1) return "Closes"; return "Deepens"; };

  const getModsForRole = (roleName) => {
    const primary = MODALITIES.filter(m => m.canFill && m.canFill.includes(roleName));
    const secondary = MODALITIES.filter(m => !m.canFill || !m.canFill.includes(roleName));
    return { primary, secondary };
  };

  const assignRole = (roleIndex, modId) => {
    const newAssignments = {...roleAssignments};
    const currentId = newAssignments[roleIndex];
    const currentBase = currentId?.split("__")[0];
    if (modId === "__clear__" || currentBase === modId) {
      if (currentId?.startsWith("custom_")) { const d={...customModData}; delete d[currentId]; setCustomModData(d); }
      delete newAssignments[roleIndex];
    } else {
      if (currentId?.startsWith("custom_")) { const d={...customModData}; delete d[currentId]; setCustomModData(d); }
      newAssignments[roleIndex] = modId + "__role_" + roleIndex + "_" + Date.now();
    }
    setRoleAssignments(newAssignments);
    const newFlow = [];
    if (activeArchetype) {
      activeArchetype.roles.forEach((_, i) => {
        if (newAssignments[i]) newFlow.push(newAssignments[i]);
      });
    }
    setFlowOrder(newFlow);
  };

  const assignCustomRole = (roleIndex, name) => {
    const id = "custom_" + Date.now();
    const newCustom = {...customModData, [id]: {id, name: name.trim(), icon:"○", color:S.mauve}};
    setCustomModData(newCustom);
    const newAssignments = {...roleAssignments, [roleIndex]: id};
    setRoleAssignments(newAssignments);
    const newFlow = [];
    if (activeArchetype) {
      activeArchetype.roles.forEach((_, i) => {
        if (newAssignments[i]) newFlow.push(newAssignments[i]);
      });
    }
    setFlowOrder(newFlow);
  };

  const generateExportText = () => {
    const L=[];
    L.push("═══════════════════════════════════════","✦ SIGNATURE SESSION DESIGN ✦","═══════════════════════════════════════","");
    if(sessionName) L.push(`SESSION: ${sessionName}`,"");
    if(sessionFrame) L.push(`FRAME: ${sessionFrame}`);
    if(sessionIntent) L.push(`TRANSFORMATION: ${sessionIntent}`);
    if(sessionFrame||sessionIntent) L.push("");
    L.push("───────────────────────────────────────","SESSION FLOW","───────────────────────────────────────","");
    flowOrder.forEach((modId,i) => { const mod=getModData(modId); const pr=getRole(i,flowOrder.length); if(mod){ const nm=mod.name||modId; const ar=activeArchetype?.roles?.[i]; if(ar){L.push(`  ${i+1}. ${ar.role} → ${nm}`,`     ${ar.job}`);}else{L.push(`  ${i+1}. ${nm}`,`     ${pr}`);} L.push(""); } });
    L.push("───────────────────────────────────────","FRAMEWORK CHECK","───────────────────────────────────────","");
    if(boundaryWho||boundaryScope||boundaryPrepared){L.push("BOUNDARIES","");if(boundaryWho)L.push(`  Who is this for: ${boundaryWho}`);if(boundaryScope)L.push(`  Outside my scope: ${boundaryScope}`);if(boundaryPrepared)L.push(`  What I need to be prepared to hold: ${boundaryPrepared}`);L.push("");}
    L.push("☐ Transformation: Can I name the core shift in one sentence?","☐ Roles: Does every modality earn its place?","☐ Sequence: Does the order serve the client's journey?","☐ Boundaries: Do I know who this is for and who it is not for?","☐ Integration: Does the client leave with a practice and accountability?","","═══════════════════════════════════════","✦ Method Alchemy Challenge · Soul Forged Founders ✦");
    setExportText(L.join("\n")); setShowExportText(true); setCopied(false);
  };

  const handleCopy = () => { const t=document.getElementById("export-textarea"); if(t){t.select();t.setSelectionRange(0,99999);try{document.execCommand("copy");setCopied(true);setTimeout(()=>setCopied(false),3000);}catch(e){}} };

  const inputStyle = { width:"100%", padding:"12px 16px", borderRadius:8, border:`1px solid ${S.line}`, background:`${S.parch},0.6)`, fontFamily:S.sans, fontSize:14, color:S.deep, outline:"none", boxSizing:"border-box" };

  const [roleCustomInput, setRoleCustomInput] = useState(null);
  const [roleCustomName, setRoleCustomName] = useState("");

  return (
    <div>
      {activeArchetype ? (
        <div>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:16}}>
            <div>
              <h4 className="f-cin" style={{fontSize:18,color:S.copper,margin:"0 0 6px",fontWeight:600}}>✦ {activeArchetype.name}</h4>
              <p className="f-play" style={{fontSize:13,color:S.plum,margin:0,fontStyle:"italic",lineHeight:1.5}}>Select your modality for each role. The role describes the job. You choose the tool.</p>
            </div>
            <button onClick={()=>{setActiveArchetype(null);setRoleAssignments({});setFlowOrder([]);onClearArchetype&&onClearArchetype();}} className="f-mont" style={{background:"none",border:"none",cursor:"pointer",fontSize:12,color:S.plum,flexShrink:0,marginLeft:12,padding:"4px 8px"}}>✕ clear</button>
          </div>

          <div style={{marginBottom:16}}><label className="f-cin" style={{fontSize:14,color:S.plum,display:"block",marginBottom:8,fontWeight:600}}>Session Name</label><input type="text" value={sessionName} onChange={e=>setSessionName(e.target.value)} placeholder="e.g., The Reclamation Session, Full Moon Unveiling Circle" style={inputStyle}/></div>
          <div style={{marginBottom:24}}><label className="f-cin" style={{fontSize:14,color:S.plum,display:"block",marginBottom:8,fontWeight:600}}>What transformation do you provide in this session?</label><input type="text" value={sessionIntent} onChange={e=>setSessionIntent(e.target.value)} placeholder="e.g., Help my client step into visibility and own their voice" style={inputStyle}/></div>

          <div style={{display:"flex",flexDirection:"column",gap:10,marginBottom:20}}>
            {activeArchetype.roles.map((r,i) => {
              const { primary, secondary } = getModsForRole(r.role);
              const assignedId = roleAssignments[i];
              const assignedBase = assignedId?.split("__")[0];
              const assignedMod = assignedId ? getModData(assignedId) : null;
              const cluster = CLUSTERS.find(c=>c.id===activeArchetype.cluster);
              const clusterColor = cluster?.color || S.copper;
              const isCustomAssigned = assignedId?.startsWith("custom_");

              return (
                <div key={i} style={{background:assignedMod?`${(assignedMod.color||S.copper)}08`:S.surface,borderRadius:12,border:assignedMod?`2px solid ${(assignedMod.color||S.copper)}30`:`1px solid ${S.line2}`,overflow:"hidden",transition:"all 0.25s ease",backdropFilter:'blur(16px)'}}>
                  <div style={{padding:"14px 16px",borderBottom:assignedMod?"none":`1px solid ${S.line2}`}}>
                    <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:6}}>
                      <span className="f-cin" style={{fontSize:15,color:clusterColor,opacity:0.5,flexShrink:0,width:22,fontWeight:600}}>{i+1}.</span>
                      <div style={{flex:1}}>
                        <div style={{display:"flex",alignItems:"center",gap:8}}>
                          <span style={{fontSize:14,color:clusterColor}}>{ROLE_MAP[r.role]?.icon||"·"}</span>
                          <span className="f-cin c-deep" style={{fontSize:15,fontWeight:600}}>{r.role}</span>
                          {assignedMod && (
                            <span className="f-mont" style={{fontSize:11,color:assignedMod.color||S.copper,background:`${(assignedMod.color||S.copper)}15`,padding:"2px 10px",borderRadius:20,fontWeight:600,display:"flex",alignItems:"center",gap:4}}>
                              <span style={{fontSize:13}}>{assignedMod.icon||"○"}</span> {assignedMod.name?.split(" & ")[0]||assignedMod.name}
                            </span>
                          )}
                        </div>
                        <p className="f-mont" style={{fontSize:12,color:S.plum,margin:"4px 0 0",lineHeight:1.5,paddingLeft:22}}>{r.job}</p>
                      </div>
                    </div>

                    <div style={{paddingLeft:32,marginTop:10}}>
                      {primary.length > 0 && (
                        <div style={{display:"flex",gap:6,flexWrap:"wrap",marginBottom:secondary.length>0?6:0}}>
                          {primary.map(mod => {
                            const isSelected = assignedBase === mod.id;
                            return (
                              <button key={mod.id} onClick={()=>assignRole(i, mod.id)} className="f-mont" style={{padding:"6px 12px",borderRadius:20,border:isSelected?`2px solid ${mod.color}`:`1px solid ${mod.color}30`,background:isSelected?`${mod.color}18`:"transparent",cursor:"pointer",fontSize:11,fontWeight:isSelected?600:400,color:isSelected?mod.color:S.plum,display:"flex",alignItems:"center",gap:5,transition:"all 0.2s ease"}}>
                                <span style={{fontSize:13,color:mod.color}}>{mod.icon}</span>
                                {mod.name.split(" & ")[0]}
                                {isSelected && <span style={{fontSize:11,marginLeft:2}}>✓</span>}
                              </button>
                            );
                          })}
                        </div>
                      )}
                      <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
                        {secondary.map(mod => {
                          const isSelected = assignedBase === mod.id;
                          return (
                            <button key={mod.id} onClick={()=>assignRole(i, mod.id)} className="f-mont" style={{padding:"5px 10px",borderRadius:20,border:isSelected?`2px solid ${mod.color}`:`1px solid ${S.line2}`,background:isSelected?`${mod.color}18`:`${S.mist},0.03)`,cursor:"pointer",fontSize:10,fontWeight:isSelected?600:400,color:isSelected?mod.color:S.faint,display:"flex",alignItems:"center",gap:4,transition:"all 0.2s ease",opacity:isSelected?1:0.7}}>
                              <span style={{fontSize:11,color:isSelected?mod.color:S.faint}}>{mod.icon}</span>
                              {mod.name.split(" & ")[0]}
                              {isSelected && <span style={{fontSize:10,marginLeft:2}}>✓</span>}
                            </button>
                          );
                        })}
                        {roleCustomInput === i ? (
                          <div style={{display:"flex",gap:4,alignItems:"center"}}>
                            <input type="text" value={roleCustomName} onChange={e=>setRoleCustomName(e.target.value)} onKeyDown={e=>{if(e.key==="Enter"&&roleCustomName.trim()){assignCustomRole(i,roleCustomName);setRoleCustomInput(null);setRoleCustomName("");}}} placeholder="Your modality..." autoFocus style={{padding:"5px 10px",borderRadius:8,border:`1px solid ${S.line}`,background:`${S.parch},0.6)`,fontFamily:S.sans,fontSize:11,color:S.deep,outline:"none",width:130}}/>
                            <button onClick={()=>{if(roleCustomName.trim()){assignCustomRole(i,roleCustomName);setRoleCustomInput(null);setRoleCustomName("");}}} className="f-mont" style={{padding:"5px 10px",borderRadius:8,border:"none",background:S.copper,color:S.btnText,fontSize:10,cursor:"pointer"}}>Add</button>
                            <button onClick={()=>{setRoleCustomInput(null);setRoleCustomName("");}} style={{background:"none",border:"none",cursor:"pointer",color:S.terra,fontSize:13,padding:"2px 4px"}}>×</button>
                          </div>
                        ) : (
                          <button onClick={()=>setRoleCustomInput(i)} className="f-mont" style={{padding:"5px 10px",borderRadius:20,border:`1px dashed ${S.line}`,background:"transparent",cursor:"pointer",fontSize:10,color:S.faint,display:"flex",alignItems:"center",gap:4}}>
                            <span>+</span> Other
                          </button>
                        )}
                        {isCustomAssigned && assignedMod && (
                          <span className="f-mont" style={{padding:"5px 10px",borderRadius:20,border:`2px solid ${S.mauve}`,background:`${S.mauve}18`,fontSize:10,fontWeight:600,color:S.mauve,display:"flex",alignItems:"center",gap:4}}>
                            ○ {assignedMod.name} ✓
                            <button onClick={()=>assignRole(i, "__clear__")} style={{background:"none",border:"none",cursor:"pointer",color:S.terra,fontSize:11,padding:"0 2px",marginLeft:2}}>×</button>
                          </span>
                        )}
                      </div>
                    </div>
                  </div>
                </div>
              );
            })}
          </div>

          {activeArchetype.boundaryCheck && (
            <div style={{marginBottom:20,padding:"10px 12px",background:"rgba(196,87,31,0.06)",borderRadius:6,borderLeft:`3px solid rgba(196,87,31,0.25)`}}>
              <div className="f-mono" style={{fontSize:10,color:S.terra,textTransform:"uppercase",letterSpacing:1.5,marginBottom:4,fontWeight:500}}>Boundary Check</div>
              <p className="f-mont" style={{fontSize:12,color:S.plum,margin:0,lineHeight:1.6}}>{activeArchetype.boundaryCheck}</p>
            </div>
          )}
        </div>
      ) : (
        <div>
          <p className="f-mont" style={{fontSize:14,lineHeight:1.7,color:S.plum,margin:"0 0 20px"}}>Select your modalities and arrange them in session order. The first opens, the middle layers deepen, and the last closes. Every modality you include should earn its place in the transformation.</p>

          <div style={{marginBottom:16}}><label className="f-cin" style={{fontSize:14,color:S.plum,display:"block",marginBottom:8,fontWeight:600}}>Session Name</label><input type="text" value={sessionName} onChange={e=>setSessionName(e.target.value)} placeholder="e.g., The Reclamation Session, Full Moon Unveiling Circle" style={inputStyle}/></div>
          <div style={{marginBottom:16}}><label className="f-cin" style={{fontSize:14,color:S.plum,display:"block",marginBottom:8,fontWeight:600}}>Session Frame</label><input type="text" value={sessionFrame} onChange={e=>setSessionFrame(e.target.value)} placeholder="e.g., Full Moon in Leo, Spring Equinox, Saturn Return" style={inputStyle}/><p className="f-play" style={{fontSize:12,color:S.faint,margin:"6px 0 0",fontStyle:"italic",lineHeight:1.5}}>The sacred container or cosmic moment that holds the session.</p></div>
          <div style={{marginBottom:24}}><label className="f-cin" style={{fontSize:14,color:S.plum,display:"block",marginBottom:8,fontWeight:600}}>What transformation do you provide in this session?</label><input type="text" value={sessionIntent} onChange={e=>setSessionIntent(e.target.value)} placeholder="e.g., Help my client step into visibility and own their voice" style={inputStyle}/></div>

          <div style={{marginBottom:8}}><label className="f-cin" style={{fontSize:14,color:S.plum,display:"block",marginBottom:8,fontWeight:600}}>Select Your Modalities</label></div>
          <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill, minmax(160px, 1fr))",gap:8,marginBottom:12}}>
            {MODALITIES.map(mod => { const cnt=getModCount(mod.id); const dis=flowOrder.length>=8; return (
              <button key={mod.id} onClick={()=>!dis&&addMod(mod.id)} style={{padding:12,borderRadius:10,border:cnt>0?`2px solid ${mod.color}`:`1px solid ${S.line2}`,background:cnt>0?`${mod.color}12`:S.surface,cursor:dis?"default":"pointer",opacity:dis?0.4:1,display:"flex",alignItems:"center",gap:8,transition:"all 0.2s ease",textAlign:"left",position:"relative",backdropFilter:'blur(12px)'}}>
                <span style={{fontSize:18,color:mod.color}}>{mod.icon}</span>
                <span className="f-mont" style={{fontSize:12,color:S.deep,fontWeight:cnt>0?600:400}}>{mod.name.split(" & ")[0]}</span>
                {cnt>0 && <span style={{position:"absolute",top:-6,right:-6,background:mod.color,color:S.btnText,fontSize:10,fontFamily:S.sans,fontWeight:700,width:20,height:20,borderRadius:"50%",display:"flex",alignItems:"center",justifyContent:"center"}}>{cnt}</span>}
              </button>
            );})}
          </div>

          <div style={{marginBottom:24}}>
            {!showCustomInput ? (
              <button onClick={()=>flowOrder.length<8&&setShowCustomInput(true)} className="f-mont" style={{padding:"12px 16px",borderRadius:10,border:`1px dashed ${S.line}`,background:"transparent",cursor:flowOrder.length>=8?"default":"pointer",opacity:flowOrder.length>=8?0.4:1,display:"flex",alignItems:"center",gap:8,fontSize:12,color:S.plum,width:"100%"}}>
                <span style={{fontSize:16}}>+</span> Add another modality (EFT, Human Design, Akashic Records, NLP, etc.)
              </button>
            ) : (
              <div style={{display:"flex",gap:8,alignItems:"center"}}>
                <input type="text" value={customName} onChange={e=>setCustomName(e.target.value)} onKeyDown={e=>e.key==="Enter"&&addCustomMod()} placeholder="Type your modality name..." autoFocus style={{...inputStyle,flex:1}}/>
                <button onClick={addCustomMod} className="f-mont" style={{padding:"12px 20px",borderRadius:8,border:"none",background:S.copper,color:S.btnText,fontSize:13,cursor:"pointer",whiteSpace:"nowrap"}}>Add</button>
                <button onClick={()=>{setShowCustomInput(false);setCustomName("");}} style={{padding:12,borderRadius:8,border:"none",background:"transparent",color:S.terra,fontSize:16,cursor:"pointer"}}>×</button>
              </div>
            )}
            {flowOrder.filter(id=>id.startsWith("custom_")).map(id=>customModData[id]).filter(Boolean).length>0 && (
              <div style={{display:"flex",gap:6,flexWrap:"wrap",marginTop:8}}>
                {flowOrder.filter(id=>id.startsWith("custom_")).map(id=>customModData[id]).filter(Boolean).map(cm=>(
                  <span key={cm.id} className="f-mont" style={{padding:"6px 12px",borderRadius:16,background:`${S.mist},0.06)`,border:`1px solid ${S.line2}`,fontSize:12,color:S.plum,display:"flex",alignItems:"center",gap:6}}>
                    ○ {cm.name} <button onClick={()=>removeFromFlow(cm.id)} style={{background:"none",border:"none",cursor:"pointer",color:S.terra,fontSize:14,padding:"0 2px"}}>×</button>
                  </span>
                ))}
              </div>
            )}
          </div>
        </div>
      )}

      {/* Flow display */}
      {flowOrder.length > 0 && (
        <div style={{background:S.surface,borderRadius:12,padding:20,border:`1px solid ${S.line2}`,backdropFilter:'blur(16px)',boxShadow:S.shadow}}>
          <h4 className="f-cin c-deep" style={{fontSize:17,margin:"0 0 4px"}}>{sessionName||"Your Session Flow"}</h4>
          {sessionFrame && <div className="f-play" style={{fontSize:13,color:S.terra,marginBottom:16,fontStyle:"italic"}}>✦ {sessionFrame}</div>}
          {!sessionFrame && <div style={{marginBottom:12}}/>}

          {flowOrder.map((modId,index)=>{
            const mod=getModData(modId); if(!mod) return null;
            const role=getRole(index,flowOrder.length); const isC=modId.startsWith("custom_"); const mc=mod.color||S.copper;
            return (
              <div key={modId} style={{display:"flex",alignItems:"center",gap:12,padding:14,background:`${mc}08`,borderRadius:8,marginBottom:8,border:`1px solid ${mc}20`,borderLeft:`3px solid ${mc}`}}>
                {!activeArchetype && <div style={{display:"flex",flexDirection:"column",gap:2}}>
                  <button onClick={()=>moveInFlow(index,-1)} disabled={index===0} style={{background:"none",border:"none",cursor:index===0?"default":"pointer",opacity:index===0?0.2:0.6,fontSize:10,padding:"2px 4px",color:S.plum}}>▲</button>
                  <button onClick={()=>moveInFlow(index,1)} disabled={index===flowOrder.length-1} style={{background:"none",border:"none",cursor:index===flowOrder.length-1?"default":"pointer",opacity:index===flowOrder.length-1?0.2:0.6,fontSize:10,padding:"2px 4px",color:S.plum}}>▼</button>
                </div>}
                <span style={{fontSize:isC?16:20,color:mc,width:36,height:36,display:"flex",alignItems:"center",justifyContent:"center",background:`${mc}15`,borderRadius:"50%",flexShrink:0}}>{mod.icon||"○"}</span>
                <div style={{flex:1}}>
                  <div className="f-cin c-deep" style={{fontSize:14,fontWeight:600}}>{mod.name}</div>
                  <div className="f-play" style={{fontSize:12,color:mc,fontStyle:"italic"}}>{activeArchetype ? (activeArchetype.roles[index]?.role || role) : role}{!isC&&mod.sequencing&&!activeArchetype?` · ${mod.sequencing.position}`:""}</div>
                  {activeArchetype && activeArchetype.roles[index] && <div className="f-mont" style={{fontSize:11,color:S.plum,marginTop:2,lineHeight:1.4}}>{activeArchetype.roles[index].job}</div>}
                </div>
                {!activeArchetype && <button onClick={()=>removeFromFlow(modId)} style={{background:"none",border:"none",cursor:"pointer",fontSize:16,color:S.terra,opacity:0.5,padding:"4px 8px"}}>×</button>}
              </div>
            );
          })}

          {(sessionFrame||sessionIntent)&&flowOrder.length>=2 && (
            <div style={{marginTop:16,padding:16,background:`rgba(44,95,90,0.06)`,borderRadius:8,border:`1px solid rgba(44,95,90,0.15)`}}>
              {sessionIntent && <p className="f-play" style={{fontSize:13,color:S.sage,margin:"0 0 8px",lineHeight:1.6,fontStyle:"italic"}}>✦ Transformation: {sessionIntent}</p>}
              <p className="f-play" style={{fontSize:13,color:S.sage,margin:0,fontStyle:"italic",lineHeight:1.6}}>Your session opens with {getModData(flowOrder[0])?.name?.split(" & ")[0]||flowOrder[0]} and closes with {getModData(flowOrder[flowOrder.length-1])?.name?.split(" & ")[0]||flowOrder[flowOrder.length-1]}. Check that your opening modality creates the right arrival state and your closing modality serves integration.</p>
            </div>
          )}

          {/* Boundary reflection */}
          <div style={{marginTop:16,padding:18,background:`${S.mist},0.03)`,borderRadius:10,border:`1px solid ${S.line2}`}}>
            <h4 className="f-cin" style={{fontSize:14,color:S.copper,margin:"0 0 4px",fontWeight:600}}>Boundary Reflection</h4>
            <p className="f-play" style={{fontSize:12,color:S.plum,margin:"0 0 14px",fontStyle:"italic",lineHeight:1.5}}>Answer these for the session you just designed. They become part of your session details.</p>
            <div style={{marginBottom:12}}><label className="f-mont" style={{fontSize:12,color:S.plum,display:"block",marginBottom:4,fontWeight:600}}>Who is this session for?</label><input type="text" value={boundaryWho} onChange={e=>setBoundaryWho(e.target.value)} placeholder="What readiness does this session require from the client?" style={inputStyle}/></div>
            <div style={{marginBottom:12}}><label className="f-mont" style={{fontSize:12,color:S.plum,display:"block",marginBottom:4,fontWeight:600}}>What is outside my scope in this session?</label><input type="text" value={boundaryScope} onChange={e=>setBoundaryScope(e.target.value)} placeholder="Where do I refer out?" style={inputStyle}/></div>
            <div><label className="f-mont" style={{fontSize:12,color:S.plum,display:"block",marginBottom:4,fontWeight:600}}>What could this session surface that I need to be prepared to hold?</label><input type="text" value={boundaryPrepared} onChange={e=>setBoundaryPrepared(e.target.value)} placeholder="What emotional or energetic responses should I be ready for?" style={inputStyle}/></div>
          </div>

          <div style={{marginTop:16,textAlign:"center"}}>
            <button onClick={generateExportText} className="f-cin" style={{padding:"12px 28px",borderRadius:30,border:`2px solid ${S.copper}`,background:"transparent",color:S.copper,fontSize:14,fontWeight:600,cursor:"pointer",letterSpacing:0.5}}>✦ Get Your Session Details</button>
          </div>

          {showExportText && (
            <div style={{marginTop:16,background:S.surface,borderRadius:12,padding:20,border:`1px solid ${S.line}`,backdropFilter:'blur(16px)'}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
                <p className="f-play" style={{fontSize:13,color:S.plum,margin:0,fontStyle:"italic"}}>Select all the text below and copy it to paste wherever you need it ✦</p>
                <button onClick={()=>setShowExportText(false)} style={{background:"none",border:"none",cursor:"pointer",fontSize:18,color:S.terra,padding:"0 4px"}}>×</button>
              </div>
              <textarea id="export-textarea" readOnly value={exportText} onFocus={e=>e.target.select()} onClick={e=>e.target.select()} style={{width:"100%",minHeight:320,padding:16,borderRadius:8,border:`1px solid ${S.line2}`,background:S.bg,fontFamily:S.mono,fontSize:12,lineHeight:1.6,color:S.deep,resize:"vertical",outline:"none",boxSizing:"border-box"}}/>
              <div style={{textAlign:"center",marginTop:12}}>
                <button onClick={handleCopy} className="f-cin" style={{padding:"10px 24px",borderRadius:30,border:copied?`2px solid ${S.sage}`:`2px solid ${S.copper}`,background:copied?`rgba(44,95,90,0.06)`:"transparent",color:copied?S.sage:S.copper,fontSize:14,fontWeight:600,cursor:"pointer",transition:"all 0.3s ease"}}>{copied?"✦ Copied":"Copy Text"}</button>
              </div>
            </div>
          )}
        </div>
      )}

      {flowOrder.length===0 && !activeArchetype && (
        <div className="f-play" style={{textAlign:"center",padding:32,color:S.faint,fontSize:15,fontStyle:"italic"}}>Select your first modality to begin designing your session flow</div>
      )}
      {activeArchetype && flowOrder.length < activeArchetype.roles.length && (
        <div className="f-play" style={{textAlign:"center",padding:24,color:S.faint,fontSize:14,fontStyle:"italic"}}>{flowOrder.length === 0 ? "Select a modality for each role above to build your session flow" : `${flowOrder.length} of ${activeArchetype.roles.length} roles assigned`}</div>
      )}
    </div>
  );
}

      </footer>
    </div>
  );
}
